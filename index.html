<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP3.com Infinite Radio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MP3 Radio" />
</head>
<body>
  <div id="app">
    <h1>📻 MP3.com Infinite Radio</h1>
    <p class="subtitle">257,090 forgotten songs. One random station.</p>

    <div id="now-playing">
      <div id="track-title">Loading catalog…</div>
      <div id="track-artist"></div>
    </div>

    <audio id="audio" controls></audio>

    <div id="controls">
      <button id="btn-play">⏯ Play / Pause</button>
      <button id="btn-skip">⏭ Skip</button>
    </div>

    <div id="history">
      <h2>Recently Played</h2>
      <ul id="history-list"></ul>
    </div>

    <footer>
      All music hosted by <a href="https://archive.org/details/mp3-com-rescue-barge" target="_blank">Internet Archive – MP3.com Rescue Barge</a>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/mp3com-radio/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
</body>
</html>
